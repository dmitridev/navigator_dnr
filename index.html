<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Навигатор ДНР</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://st.max.ru/js/max-web-app.js"></script>
</head>

<body>
    <main>
        <div class="title flex-centered-container-with-gap">
            <h1>Навигатор ДНР</h1>
            <span>Добро пожаловать!</span>
            <div class="flex-centered-container-with-gap">
                <span>С помощью этого мини-приложения вы можете перейти на официальные ресурсы госорганизаций ДНР и
                    получить
                    услуги, в
                    которых нуждаетесь. Выберите, что бы вы хотели сделать.</span>
                <button onclick='WebApp.openMaxLink("https://max.ru/donbass_vmeste_bot")'>Задать вопрос Главе
                    ДНР</button>
                <button onclick='WebApp.openMaxLink("https://max.ru/mfc_dnr_max_bot")'>Записаться на прием в
                    МФЦ</button>
                <button onclick='WebApp.openMaxLink("https://max.ru/lgotnie_lekarstva_dnr_bot")'>Найти в аптеках
                    льготное лекарство</button>
                <button onclick='WebApp.openMaxLink("https://max.ru/miac_dnr_bot" )'>Записаться на прием к
                    врачу</button>
                <button onclick="WebApp.openMaxLink('https://max.ru/id237403175201_1_bot')">Оплатить услуги
                    водоснабжения</button>
                <button onclick='WebApp.openMaxLink("https://max.ru/svo_dnr_bot")'>Узнать о мерах поддержки
                    участников СВО</button>
                <button onclick=' WebApp.openMaxLink("https://max.ru/minsport_dpr_helper_bot")'>Записать ребенка в
                    спортивную секцию</button>
                <button onclick='WebApp.openMaxLink("https://max.ru/postdon_bot")'>Отследить почтоввое отправление
                    по трек-номеру</button>
            </div>
        </div>
    </main>
</body>

</html>
